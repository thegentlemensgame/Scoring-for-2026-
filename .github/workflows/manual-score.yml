name: Manual Score Match

on:
  workflow_dispatch:
    inputs:
      match_url:
        description: 'ESPN Cricinfo full-scorecard URL'
        required: true
        type: string

jobs:
  manual-score:
    name: Score Match from URL
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scorer for specific match
        env:
          FIREBASE_KEY: ${{ secrets.FIREBASE_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python auto_scorer.py --match-url "${{ github.event.inputs.match_url }}"
